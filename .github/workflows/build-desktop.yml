name: Build Infinite Files Desktop

on:
  push:
    branches: ["main", "work"]
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev libstdc++-12-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Generate Linux platform folder
        run: flutter create --platforms=linux .

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: infinite-files-linux-bundle
          path: build/linux/x64/release/bundle/

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Generate Windows platform folder
        run: flutter create --platforms=windows .

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Prepare Windows portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows-portable | Out-Null
          Copy-Item -Recurse -Force build/windows/x64/runner/Release/* dist/windows-portable/
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "dist/windows-portable/vc_redist.x64.exe"
          @"
          If you see a VCRUNTIME140.dll error, install vc_redist.x64.exe first, then start infinite_files.exe.
          "@ | Set-Content dist/windows-portable/README_RUNTIME.txt

      - name: Upload Windows portable package
        uses: actions/upload-artifact@v4
        with:
          name: infinite-files-windows-portable
          path: dist/windows-portable/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Generate macOS platform folder
        run: flutter create --platforms=macos .

      - name: Flutter pub get
        run: flutter pub get

      - name: Build DMG package
        run: bash scripts/package_dmg.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: infinite-files-macos-dmg
          path: dist/InfiniteFiles.dmg